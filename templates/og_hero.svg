<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="{{ bg_stop_0 }}"/>
      <stop offset="100%" stop-color="{{ bg_stop_1 }}"/>
    </linearGradient>
    <filter id="noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noiseOut"/>
      <feColorMatrix type="saturate" values="0" in="noiseOut" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    {% if screenshot_b64 != "" %}
    <clipPath id="sc-clip">
      <rect x="{{ sc_x }}" y="{{ sc_y }}" width="{{ sc_w }}" height="{{ sc_h }}" rx="14"/>
    </clipPath>
    {% endif %}
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Noise overlay -->
  <rect width="1200" height="630" fill="url(#bg)" filter="url(#noise)" opacity="{{ noise_opacity }}"/>

  {% if screenshot_b64 == "" %}
  <!-- Decorative circles (only shown without screenshot) -->
  <circle cx="1100" cy="-80" r="320" fill="white" opacity="0.06"/>
  <circle cx="1150" cy="680" r="200" fill="white" opacity="0.04"/>
  {% endif %}

  {% if screenshot_b64 != "" %}
  <!-- Frame shadow (fixed position) -->
  <rect x="668" y="48" width="500" height="542" rx="14" fill="black" opacity="0.18"/>
  <!-- Frame border -->
  <rect x="664" y="44" width="500" height="542" rx="14"
        fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
  <!-- Image on top of everything, floating left past the frame border -->
  <image href="{{ screenshot_b64 }}"
         x="{{ sc_x }}" y="{{ sc_y }}" width="{{ sc_w }}" height="{{ sc_h }}"
         clip-path="url(#sc-clip)"
         preserveAspectRatio="xMidYTop slice"/>
  {% endif %}

  <!-- Tag line -->
  <text
    x="72"
    y="96"
    font-family="Inter"
    font-size="{{ tag_size }}"
    font-weight="{{ tag_weight }}"
    fill="{{ tag_color }}"
    opacity="0.85"
  >{{ tag_text }}</text>

  <!-- Title line 1 -->
  <text
    x="72"
    y="{{ title_y1 }}"
    font-family="Inter"
    font-size="{{ title_size }}"
    font-weight="{{ title_weight }}"
    fill="{{ title_color }}"
  >{{ title_line1 }}</text>

  {% if title_line2 != "" %}
  <!-- Title line 2 -->
  <text
    x="72"
    y="{{ title_y2 }}"
    font-family="Inter"
    font-size="{{ title_size }}"
    font-weight="{{ title_weight }}"
    fill="{{ title_color }}"
  >{{ title_line2 }}</text>
  {% endif %}

  <!-- Bottom rule -->
  <rect x="72" y="560" width="80" height="4" rx="2" fill="{{ tag_color }}" opacity="0.5"/>
</svg>
